<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mike &amp; Sons Landscaping — Coming Soon</title>
  <meta name="description" content="Mike &amp; Sons Landscaping — professional landscaping and outdoor services. Our new website is coming soon." />
  <meta name="theme-color" content="#1b4332" />
  <link rel="icon" type="image/png" href="mike and sons logo.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="Mike &amp; Sons Landscaping" />
  <meta property="og:description" content="Professional landscaping and outdoor services. Website coming soon." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="mike and sons logo.png" />

  <style>
    :root {
      --green-deep: #1b4332;
      --green: #2d6a4f;
      --green-soft: #95d5b2;
      --cream: #f7f4ec;
      --ink: #1c2620;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(149, 213, 178, 0.25), transparent 60%),
        linear-gradient(160deg, var(--green-deep) 0%, #12382a 55%, #0d2c21 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      text-align: center;
      line-height: 1.6;
    }

    .card {
      max-width: 620px;
      width: 100%;
      animation: rise 0.8s ease-out both;
    }

    .logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin: 0 auto 1.75rem;
      display: block;
      border-radius: 50%;
      background: rgba(247, 244, 236, 0.06);
      padding: 14px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: clamp(1.9rem, 5vw, 2.9rem);
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: var(--green-soft);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      border: 1px solid rgba(149, 213, 178, 0.45);
      background: rgba(149, 213, 178, 0.1);
      color: var(--green-soft);
      padding: 0.55rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
    }

    p.lead {
      color: rgba(247, 244, 236, 0.85);
      font-size: 1.05rem;
      max-width: 460px;
      margin: 0 auto;
    }

    .divider {
      width: 64px;
      height: 3px;
      background: var(--green-soft);
      border-radius: 3px;
      margin: 1.75rem auto 0;
      opacity: 0.7;
    }

    footer {
      margin-top: 2.25rem;
      font-size: 0.8rem;
      color: rgba(247, 244, 236, 0.5);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="mike and sons logo.png" alt="Mike &amp; Sons Landscaping logo" />
    <span class="badge">Website Coming Soon</span>
    <h1>Mike &amp; Sons Landscaping</h1>
    <p class="tagline">Professional Landscaping &amp; Outdoor Services</p>
    <p class="lead">We're building something new. Our full website is on its way — check back soon.</p>
    <div class="divider"></div>
    <footer>&copy; <span id="year"></span> Mike &amp; Sons Landscaping. All rights reserved.</footer>
  </main>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 }}\" oninput=\"{{ onName }}\" placeholder=\"Your name\" style=\"border:1px solid rgba(21,35,61,.18);border-radius:12px;padding:14px 15px;font-size:15px;color:#15233D;outline:none;transition:border-color .15s ease,box-shadow .15s ease\" style-focus=\"border-color:#2B5BA7;box-shadow:0 0 0 3px rgba(43,91,167,.18)\">\n              <input value=\"{{ phone }}\" oninput=\"{{ onPhone }}\" placeholder=\"Phone number\" style=\"border:1px solid rgba(21,35,61,.18);border-radius:12px;padding:14px 15px;font-size:15px;color:#15233D;outline:none;transition:border-color .15s ease,box-shadow .15s ease\" style-focus=\"border-color:#2B5BA7;box-shadow:0 0 0 3px rgba(43,91,167,.18)\">\n              <select value=\"{{ service }}\" onchange=\"{{ onService }}\" style=\"border:1px solid rgba(21,35,61,.18);border-radius:12px;padding:14px 15px;font-size:15px;color:#15233D;outline:none;background:#fff;transition:border-color .15s ease,box-shadow .15s ease\" style-focus=\"border-color:#2B5BA7;box-shadow:0 0 0 3px rgba(43,91,167,.18)\">\n                <option>Roof Replacement<\u002Foption><option>Roof Repair<\u002Foption><option>Re-Roof<\u002Foption><option>Storm Damage<\u002Foption><option>Free Inspection<\u002Foption><option>Gutters &amp; More<\u002Foption>\n              <\u002Fselect>\n              <textarea value=\"{{ message }}\" oninput=\"{{ onMessage }}\" placeholder=\"Briefly, what's going on with your roof?\" rows=\"3\" style=\"border:1px solid rgba(21,35,61,.18);border-radius:12px;padding:14px 15px;font-size:15px;color:#15233D;outline:none;resize:none;transition:border-color .15s ease,box-shadow .15s ease\" style-focus=\"border-color:#2B5BA7;box-shadow:0 0 0 3px rgba(43,91,167,.18)\"><\u002Ftextarea>\n              <span onclick=\"{{ onSubmit }}\" style=\"display:flex;align-items:center;justify-content:center;gap:9px;background:#C8332B;color:#fff;font:800 16px/1 Archivo,sans-serif;padding:16px;border-radius:12px;cursor:pointer;box-shadow:0 16px 30px -14px rgba(200,51,43,.75);transition:transform .15s ease,background .15s ease\" style-hover=\"background:#A82A22;transform:translateY(-2px)\">Get My Free Quote <i data-lucide=\"arrow-right\" style=\"width:18px;height:18px\"><\u002Fi><\u002Fspan>\n              <div style=\"font:600 11.5px/1.4 JetBrains Mono,monospace;color:#8A92A6;text-align:center\">We'll text you back, usually within the hour.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:30px 10px\">\n            <div style=\"width:64px;height:64px;border-radius:50%;background:rgba(43,91,167,.12);display:flex;align-items:center;justify-content:center;margin:0 auto\"><i data-lucide=\"check-check\" style=\"width:32px;height:32px;color:#2B5BA7\"><\u002Fi><\u002Fdiv>\n            <div style=\"font:900 24px/1.1 Archivo,sans-serif;color:#15233D;margin-top:18px\">Thanks, {{ sentName }}!<\u002Fdiv>\n            <p style=\"font:500 15px/1.6 Archivo,sans-serif;color:#586079;margin:10px 0 0\">Your request is in. A member of the family will text you back at <strong style=\"color:#15233D\">{{ sentPhone }}<\u002Fstrong> — usually within the hour.<\u002Fp>\n            <a href=\"tel:9707802900\" style=\"display:inline-flex;align-items:center;gap:8px;font:800 14px/1 Archivo,sans-serif;color:#2B5BA7;margin-top:18px;text-decoration:none\"><i data-lucide=\"phone\" style=\"width:16px;height:16px\"><\u002Fi>Or call (970) 780-2900<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer style=\"background:#101B30;color:#C3CEE2;padding:64px 0 30px\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:36px\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <svg viewBox=\"0 0 200 224\" width=\"46\" style=\"flex:none;display:block\"><path d=\"M100 8 L186 30 V120 C186 168 148 198 100 216 C52 198 14 168 14 120 V30 Z\" fill=\"#3E73C4\"><\u002Fpath><path d=\"M100 20 L176 39 V119 C176 160 144 186 100 202 C56 186 24 160 24 119 V39 Z\" fill=\"#FFFFFF\"><\u002Fpath><g transform=\"translate(100 104) rotate(-34)\" fill=\"#2B5BA7\"><rect x=\"-22\" y=\"-58\" width=\"44\" height=\"20\" rx=\"4\"><\u002Frect><rect x=\"-5\" y=\"-40\" width=\"10\" height=\"74\" rx=\"4\"><\u002Frect><\u002Fg><g transform=\"translate(100 104) rotate(34)\" fill=\"#C8332B\"><rect x=\"-22\" y=\"-58\" width=\"44\" height=\"20\" rx=\"4\"><\u002Frect><rect x=\"-5\" y=\"-40\" width=\"10\" height=\"74\" rx=\"4\"><\u002Frect><\u002Fg><path d=\"M100 56 L138 96 V150 H62 V96 Z\" fill=\"#2B5BA7\"><\u002Fpath><rect x=\"84\" y=\"110\" width=\"32\" height=\"32\" fill=\"#FFFFFF\"><\u002Frect><line x1=\"100\" y1=\"110\" x2=\"100\" y2=\"142\" stroke=\"#2B5BA7\" stroke-width=\"4\"><\u002Fline><line x1=\"84\" y1=\"126\" x2=\"116\" y2=\"126\" stroke=\"#2B5BA7\" stroke-width=\"4\"><\u002Fline><\u002Fsvg>\n          <div style=\"line-height:1\"><div style=\"font:800 13px/1 Archivo,sans-serif;letter-spacing:0.03em;color:#fff\">MIKE <span style=\"color:#E0654E\">&amp;<\u002Fspan> SONS<\u002Fdiv><div style=\"font:900 24px/0.95 Archivo,sans-serif;color:#fff\">ROOFING<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font:500 14px/1.65 Archivo,sans-serif;color:#9FACC6;margin:18px 0 0;max-width:300px\">A family-owned roofing crew serving Northern Colorado for three generations. Roofing, repairs &amp; re-roofs done right.<\u002Fp>\n        <div style=\"font:600 13px/1 JetBrains Mono,monospace;color:#7FA8E0;margin-top:18px\">Roofing · Repairs · Re-Roofs<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font:800 12px/1 JetBrains Mono,monospace;letter-spacing:0.12em;color:#fff;text-transform:uppercase;margin-bottom:16px\">Services<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;font:600 14px/1 Archivo,sans-serif;color:#9FACC6\">\n          <span onclick=\"{{ goServices }}\" style=\"cursor:pointer\" style-hover=\"color:#fff\">Roof Replacement<\u002Fspan>\n          <span onclick=\"{{ goServices }}\" style=\"cursor:pointer\" style-hover=\"color:#fff\">Roof Repairs<\u002Fspan>\n          <span onclick=\"{{ goServices }}\" style=\"cursor:pointer\" style-hover=\"color:#fff\">Re-Roofs<\u002Fspan>\n          <span onclick=\"{{ goServices }}\" style=\"cursor:pointer\" style-hover=\"color:#fff\">Storm Damage<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font:800 12px/1 JetBrains Mono,monospace;letter-spacing:0.12em;color:#fff;text-transform:uppercase;margin-bottom:16px\">Service area<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;font:600 14px/1 Archivo,sans-serif;color:#9FACC6\">\n          <span>Fort Collins<\u002Fspan><span>Loveland<\u002Fspan><span>Windsor<\u002Fspan><span>Greeley<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font:800 12px/1 JetBrains Mono,monospace;letter-spacing:0.12em;color:#fff;text-transform:uppercase;margin-bottom:16px\">Get in touch<\u002Fdiv>\n        <a href=\"tel:9707802900\" style=\"display:flex;align-items:center;gap:8px;font:700 16px/1 JetBrains Mono,monospace;color:#fff;text-decoration:none\"><i data-lucide=\"phone\" style=\"width:17px;height:17px;color:#7FA8E0\"><\u002Fi>(970) 780-2900<\u002Fa>\n        <div style=\"display:flex;align-items:center;gap:8px;font:600 13.5px/1.4 Archivo,sans-serif;color:#9FACC6;margin-top:14px\"><i data-lucide=\"clock\" style=\"width:16px;height:16px;color:#7FA8E0\"><\u002Fi>Mon–Sat · 7am–6pm<\u002Fdiv>\n        <span onclick=\"{{ goQuote }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:#C8332B;color:#fff;font:800 13.5px/1 Archivo,sans-serif;padding:13px 18px;border-radius:11px;cursor:pointer;margin-top:18px\" style-hover=\"background:#A82A22\">Free Estimate <i data-lucide=\"arrow-right\" style=\"width:15px;height:15px\"><\u002Fi><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1240px;margin:40px auto 0;padding:22px 40px 0;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n      <div style=\"font:600 12.5px/1 JetBrains Mono,monospace;color:#7A8298\">© 2026 Mike &amp; Sons Roofing · Licensed &amp; insured<\u002Fdiv>\n      <div style=\"font:600 12.5px/1 JetBrains Mono,monospace;color:#7A8298\">Built by A Light in the Sky<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { form:{ name:'', phone:'', service:'Roof Replacement', message:'' }, sent:false, sentName:'', sentPhone:'', openFaq:0 };\n\n  componentDidMount(){\n    this.icons();\n    this.header = document.getElementById('msr-header');\n    this._scroll = () => this.onScroll();\n    window.addEventListener('scroll', this._scroll, { passive:true });\n    this.setupReveal();\n    this.onScroll();\n  }\n  componentDidUpdate(){ this.icons(); }\n  componentWillUnmount(){ window.removeEventListener('scroll', this._scroll); }\n\n  icons(){ try { if (window.lucide) window.lucide.createIcons(); } catch(e){} }\n\n  onScroll(){\n    const y = window.scrollY || window.pageYOffset || 0;\n    if (!this.header) return;\n    if (y > 14){\n      this.header.style.boxShadow = '0 8px 26px -18px rgba(21,35,61,.55)';\n      this.header.style.background = 'rgba(244,239,227,.9)';\n      this.header.style.backdropFilter = 'saturate(1.1) blur(8px)';\n    } else {\n      this.header.style.boxShadow = 'none';\n      this.header.style.background = 'rgba(244,239,227,1)';\n      this.header.style.backdropFilter = 'none';\n    }\n  }\n\n  setupReveal(){\n    const els = Array.from(document.querySelectorAll('#msr-site [data-reveal]'));\n    const show = (el) => { el.style.transitionDelay = (el.getAttribute('data-reveal-delay')||'0') + 'ms'; el.style.opacity='1'; el.style.transform='none'; };\n    if (!('IntersectionObserver' in window) || window.matchMedia('(prefers-reduced-motion: reduce)').matches){\n      els.forEach(show); return;\n    }\n    const io = new IntersectionObserver((ents)=>{\n      ents.forEach(en=>{ if (en.isIntersecting){ show(en.target); io.unobserve(en.target); } });\n    }, { threshold:0.08, rootMargin:'0px 0px -5% 0px' });\n    els.forEach(el=>io.observe(el));\n    this._fallback = setTimeout(()=>els.forEach(el=>{ if (el.style.opacity!=='1') show(el); }), 2000);\n  }\n\n  scrollToId(id){ const el = document.getElementById(id); if(!el) return; const y = el.getBoundingClientRect().top + window.scrollY - 78; window.scrollTo({ top:y, behavior:'smooth' }); }\n\n  setField(k,v){ this.setState(s=>({ form:{ ...s.form, [k]:v } })); }\n  submit(e){ if (e && e.preventDefault) e.preventDefault(); const f=this.state.form; this.setState({ sent:true, sentName: f.name.trim() || 'neighbor', sentPhone: f.phone.trim() || 'your number' }); }\n  toggleFaq(i){ this.setState(s=>({ openFaq: s.openFaq===i ? -1 : i })); }\n\n  renderVals(){\n    const f = this.state.form;\n    const services = [\n      { icon:'home',           title:'Roof Replacement', desc:'Full tear-off and new installs built to last decades — shingle, metal, and flat systems.' },\n      { icon:'wrench',         title:'Roof Repairs',     desc:'Leaks, missing shingles, flashing, and wind damage fixed fast — often the same week.' },\n      { icon:'layers',         title:'Re-Roofs',         desc:'Smart overlay options when a full replacement isn\\u2019t needed quite yet.' },\n      { icon:'cloud-lightning',title:'Storm Damage',     desc:'Wind and hail inspections with insurance-claim help from first call to final invoice.' },\n      { icon:'clipboard-check',title:'Free Inspections', desc:'A thorough on-roof assessment with honest photos and a clear written estimate.' },\n      { icon:'hard-hat',       title:'Gutters & More',   desc:'Gutters, fascia, soffit, and ventilation to keep the whole roof system healthy.' },\n    ].map((s,i)=>({ ...s, delay:String(i*70) }));\n\n    const projects = [\n      { id:'msr-proj-1', title:'Asphalt shingle re-roof', place:'Fort Collins, CO', ph:'Drop a project photo' },\n      { id:'msr-proj-2', title:'Standing-seam metal',     place:'Windsor, CO',      ph:'Drop a project photo' },\n      { id:'msr-proj-3', title:'Hail damage repair',      place:'Loveland, CO',     ph:'Drop a project photo' },\n      { id:'msr-proj-4', title:'Full tear-off & install', place:'Greeley, CO',      ph:'Drop a project photo' },\n    ].map((p,i)=>({ ...p, delay:String(i*70) }));\n\n    const reviews = [\n      { initial:'M', name:'Maria T.', place:'Windsor, CO',   text:'Mike and his sons replaced our whole roof in two days. Clean, on time, and the price didn\\u2019t change. You can tell it\\u2019s a family that cares.' },\n      { initial:'D', name:'Dave R.',  place:'Fort Collins',  text:'Had a leak the night before a storm. They came out same day, tarped it, and had it fully repaired that week. Absolute lifesavers.' },\n      { initial:'S', name:'Sandra K.',place:'Loveland, CO',  text:'Got three quotes \\u2014 Mike & Sons was the only one who got on the roof and showed me photos. No pressure, just honest work.' },\n    ].map((r,i)=>({ ...r, delay:String(i*70) }));\n\n    const stats = [\n      { icon:'star',          n:'4.9\\u2605',   l:'380+ reviews' },\n      { icon:'calendar-check',n:'15 yrs',  l:'In business' },\n      { icon:'shield-check',  n:'Licensed',l:'& fully insured' },\n      { icon:'clock',         n:'Same wk', l:'Scheduling' },\n    ];\n\n    const faqsData = [\n      { q:'Do you offer free estimates?',     a:'Always. We\\u2019ll come out, get on the roof, and give you honest photos with a clear written estimate \\u2014 no pressure and no sales call.' },\n      { q:'Do you help with insurance claims?',a:'Yes. We document storm and hail damage thoroughly and work directly with your adjuster from inspection through final invoice.' },\n      { q:'How fast can you schedule?',        a:'Most repairs are handled the same week. Full replacements are typically scheduled within a couple of weeks, weather permitting.' },\n      { q:'What areas do you serve?',          a:'Northern Colorado \\u2014 Fort Collins, Loveland, Windsor, Greeley, and the surrounding communities.' },\n    ];\n    const faqs = faqsData.map((x,i)=>({ ...x, delay:String(i*60), open:this.state.openFaq===i, icon:this.state.openFaq===i?'minus':'plus', toggle:()=>this.toggleFaq(i) }));\n\n    return {\n      services, projects, reviews, stats, faqs,\n      goTop:()=>window.scrollTo({ top:0, behavior:'smooth' }),\n      goQuote:()=>this.scrollToId('quote'),\n      goServices:()=>this.scrollToId('services'),\n      goWork:()=>this.scrollToId('work'),\n      goReviews:()=>this.scrollToId('reviews'),\n      goFaq:()=>this.scrollToId('faq'),\n      name:f.name, phone:f.phone, service:f.service, message:f.message,\n      onName:(e)=>this.setField('name', e.target.value),\n      onPhone:(e)=>this.setField('phone', e.target.value),\n      onService:(e)=>this.setField('service', e.target.value),\n      onMessage:(e)=>this.setField('message', e.target.value),\n      onSubmit:(e)=>this.submit(e),\n      sent:this.state.sent, notSent:!this.state.sent, sentName:this.state.sentName, sentPhone:this.state.sentPhone,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
